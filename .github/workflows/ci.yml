name: CI

on:
  push:
  pull_request:

permissions: {}

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch full history so commitlint can walk back to the base branch
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli@20.5.0 @commitlint/config-conventional@20.5.0

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/

      - name: Tests
        run: uv run pytest --tb=short
