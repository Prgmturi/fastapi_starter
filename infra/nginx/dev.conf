server {
    listen 80;
    server_name localhost;

    # Backend FastAPI — /api/* viene proxato rimuovendo il prefisso /api
    # Keycloak callback redirect_uri usa http://localhost/app/callback/
    location /api/ {
        proxy_pass         http://host.docker.internal:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend Astro dev server — tutto il resto (incluso HMR websocket)
    location / {
        proxy_pass         http://host.docker.internal:4321/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_http_version 1.1;
    }
}
