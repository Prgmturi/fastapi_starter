# =============================================================================
# Keycloak + PostgreSQL
# =============================================================================
# Questo compose gestisce l'infrastruttura di autenticazione.
# Keycloak ha il suo database Postgres dedicato.
#
# Uso:
#   docker compose up -d
#
# Accesso:
#   - Keycloak Admin: http://localhost:8080
#   - Health check:   http://localhost:9000/health
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL per Keycloak
  # ---------------------------------------------------------------------------
  keycloak-db:
    image: postgres:17-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      # Admin
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Features
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080:8080"   # Admin console e API
      - "9000:9000"   # Health e metrics
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - keycloak-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy locale (stessa origine per frontend + backend)
  #
  # localhost:80/       → Astro dev server (localhost:4321)
  # localhost:80/auth/  → FastAPI (localhost:8000)
  #
  # Questo elimina il problema cross-origin dei cookie HttpOnly in sviluppo.
  # In produzione Nginx ha la stessa responsabilità con la config di prod.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: dev-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

networks:
  keycloak-network:
    name: keycloak-network

volumes:
  keycloak_db_data:
    name: keycloak_db_data